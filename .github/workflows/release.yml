name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Determine Version
        id: get_version
        run: |
          VERSION=$(grep -m 1 "MARKETING_VERSION =" Hangar.xcodeproj/project.pbxproj | tr -d ';"\t ' | cut -d= -f2)
          if [ -z "$VERSION" ]; then
            VERSION="1.0"
          fi
          RELEASE_VERSION="${VERSION}.${{ github.run_number }}"
          echo "version=${RELEASE_VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${RELEASE_VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body: |
            Automatic release generated by GitHub Actions.
            
            ### Changes in this Release
            * Built locally with Xcode 26 to include full Tahoe SDK features (Liquid Glass theme).
          draft: false
          prerelease: false
          files: Hangar.zip
          generate_release_notes: true
