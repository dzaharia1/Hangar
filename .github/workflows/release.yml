name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version
        id: get_version
        run: |
          VERSION=$(grep -m 1 "MARKETING_VERSION =" Hangar.xcodeproj/project.pbxproj | tr -d ';"\t ' | cut -d= -f2)
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Generate Changelog
        run: |
          git fetch --tags --force
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Automatic release generated by GitHub Actions." > changelog.md
          echo "" >> changelog.md
          echo "### Changes in this Release" >> changelog.md
          echo "" >> changelog.md
          if [ -n "$PREV_TAG" ]; then
            git log ${PREV_TAG}..HEAD --reverse --pretty=format:"* %s" >> changelog.md
          else
            git log --reverse --pretty=format:"* %s" >> changelog.md
          fi
          echo "" >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body_path: changelog.md
          draft: false
          prerelease: false
          files: Hangar.zip
          generate_release_notes: true
