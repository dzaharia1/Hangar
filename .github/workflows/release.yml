name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build and Release Hangar
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Build macOS App
        run: |
          xcodebuild -project Hangar.xcodeproj \
                     -scheme Hangar \
                     -configuration Release \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGN_ENTITLEMENTS=""

      - name: Compress and Package App
        run: |
          cd build/Build/Products/Release
          zip -r Hangar.zip Hangar.app

      - name: Determine Version
        id: get_version
        run: |
          # Read MARKETING_VERSION from Hangar.xcodeproj/project.pbxproj
          VERSION=$(grep -m 1 "MARKETING_VERSION =" Hangar.xcodeproj/project.pbxproj | tr -d ';"\t ' | cut -d= -f2)
          if [ -z "$VERSION" ]; then
            VERSION="1.0"
          fi
          # Append the run number to create a unique semantic version for every push to main
          RELEASE_VERSION="${VERSION}.${{ github.run_number }}"
          echo "version=${RELEASE_VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${RELEASE_VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body: |
            Automatic release generated by GitHub Actions.
            
            ### Changes in this Release
            * Built directly from the latest push to `main`.
          draft: false
          prerelease: false
          files: build/Build/Products/Release/Hangar.zip
          generate_release_notes: true
